<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Community Favourites – Media Odyssey</title>
</head>
<body>

<!-- ── Page Header ───────────────────────────────────────────────────────── -->
<h1>Community Favourites</h1>
<a href="/community/add">+ Add New Media</a>

<hr/>

<!-- ── Sort Links ────────────────────────────────────────────────────────── -->
<a href="/community">Top 10 (Score)</a> |
<a href="/community?sort=likes">Most Liked</a> |
<a href="/community?sort=views">Most Viewed</a>

<hr/>

<!-- ── Live Search Bar ───────────────────────────────────────────────────── -->
<!--
    Filters the list in real time as the user types.
    JavaScript .filter() runs on the rendered card elements (no server round-trip).
-->
<label for="searchBar">Search:</label>
<input id="searchBar" type="text" placeholder="Type a title..." autocomplete="off"/>

<hr/>

<!-- ── Category Tabs ─────────────────────────────────────────────────────── -->
<!--
    Clicking a tab filters the card grid by category instantly (no page reload).
    JavaScript shows/hides cards by data-cat without re-fetching from the server.
-->
<div>
    <button class="tab-btn active" data-cat="ALL">All</button>
    <button class="tab-btn" data-cat="Movie">Movies</button>
    <button class="tab-btn" data-cat="Game">Games</button>
    <button class="tab-btn" data-cat="Song">Songs</button>
</div>

<hr/>

<!-- ── Fast-Rising Top 5 (Trending) ──────────────────────────────────────── -->
<!--
    Items shown here have the highest weekly like growth: (likes - likesLastWeek).
    likesLastWeek is updated automatically every Sunday by TrendingScheduler.
    The badge only shows when isTrending() is true (growth >= 10%).
-->
<h2>Fast-Rising This Week (Top 5)</h2>

<div id="trendingGrid">
    <div th:each="m : ${trending}">

        <strong th:text="${m.title}">Title</strong>
        <em th:text="'[' + ${m.category} + ']'">[Category]</em>

        <!-- Trending badge: only rendered when weekly growth >= 10% -->
        <span th:if="${m.trending}"
              th:text="'▲ ' + ${#numbers.formatDecimal(m.trendingGrowth, 1, 0)} + '%'">
        </span>

        <span> | Views: </span><span th:text="${m.views}">0</span>
        <span> | Likes: </span><span th:text="${m.likes}">0</span>
        <span> | Score: </span><span th:text="${m.totalScore}">0</span>

    </div>
</div>

<hr/>

<!-- ── Media List ─────────────────────────────────────────────────────────── -->
<!--
    Default: Top 10 by Point System. Switches to full list when sort param is set.
    data-id is used by JS for AJAX calls.
    data-cat and data-title are used by JS for client-side tab/search filtering.
-->
<h2>Top 10 Ranked</h2>

<div id="top10Grid">
    <div th:each="m, stat : ${mediaList}"
         th:attr="data-id=${m.id}, data-cat=${m.category}, data-title=${m.title}">

        <strong th:text="${stat.index + 1} + '. ' + ${m.title}">1. Title</strong>
        <em th:text="'[' + ${m.category} + ']'">[Category]</em>

        <!-- Trending badge if this item also qualifies as fast-rising -->
        <span th:if="${m.trending}"
              th:text="'▲ ' + ${#numbers.formatDecimal(m.trendingGrowth, 1, 0)} + '%'">
        </span>

        <p>
            Views: <span class="views-cnt" th:text="${m.views}">0</span> |
            Likes: <span class="likes-cnt" th:text="${m.likes}">0</span> |
            Score: <span class="score-val" th:text="${m.totalScore}">0</span>
        </p>

        <!--
            Like button:
            - Disabled visually once clicked (session prevents server-side duplicate too)
            - AJAX updates count and score instantly (Optimistic UI)
        -->
        <button class="like-btn" th:attr="data-id=${m.id}">
            Like (<span class="like-count" th:text="${m.likes}">0</span>)
        </button>

    </div>
</div><!-- /#top10Grid -->

<!-- ── JavaScript ─────────────────────────────────────────────────────────── -->
<script>

    // ── Auto view count on page load ─────────────────────────────────────────
    /*
     * Sends a POST /community/view/{id} for each visible media card on load.
     * The server uses HttpSession to ensure each item is counted only once
     * per session, so refreshing the page does not inflate view counts.
     */
    document.querySelectorAll('#top10Grid > div[data-id]').forEach(card => {
        const id = card.dataset.id;
        fetch(`/community/view/${id}`, { method: 'POST' })
            .then(r => r.json())
            .then(data => {
                // Update the view count display with the server-confirmed value
                const viewEl = card.querySelector('.views-cnt');
                if (viewEl) viewEl.textContent = data.views;
                card.querySelector('.score-val').textContent = data.totalScore;
            })
            .catch(() => { /* silently fail — count stays as rendered */ });
    });

    // ── Tab switching — no page reload ──────────────────────────────────────
    const tabBtns = document.querySelectorAll('.tab-btn');
    const cards   = document.querySelectorAll('#top10Grid > div');

    tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            tabBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const query = document.getElementById('searchBar').value.trim();
            applyFilters(btn.dataset.cat, query);
        });
    });

    // ── Live search — filters list as the user types ──────────────────────
    document.getElementById('searchBar').addEventListener('input', e => {
        const activeCat = document.querySelector('.tab-btn.active').dataset.cat;
        applyFilters(activeCat, e.target.value.trim());
    });

    /**
     * applyFilters — show/hide cards without a server request.
     * A card is visible only when BOTH conditions are true:
     *   1. Its category matches the active tab (or tab is "ALL")
     *   2. Its title includes the current search query (case-insensitive)
     */
    function applyFilters(cat, query) {
        cards.forEach(card => {
            const matchCat   = (cat === 'ALL') || (card.dataset.cat === cat);
            const matchQuery = !query ||
                (card.dataset.title || '').toLowerCase().includes(query.toLowerCase());
            card.style.display = (matchCat && matchQuery) ? '' : 'none';
        });
    }

    // ── Like button — Optimistic UI ──────────────────────────────────────────
    /*
     * Clicking Like:
     *  1. Button disabled immediately (client-side guard)
     *  2. Count increments on screen before server responds (optimistic)
     *  3. Server checks HttpSession — if already liked, liked:false is returned
     *     and the count is reverted to the server value
     */
    document.querySelectorAll('.like-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            if (btn.disabled) return;
            btn.disabled = true; // prevent double-click while request is in flight

            const id      = btn.dataset.id;
            const card    = btn.closest('div');
            const countEl = btn.querySelector('.like-count');
            const scoreEl = card.querySelector('.score-val');
            const cntEl   = card.querySelector('.likes-cnt');

            // Optimistic increment
            const optimisticLikes = parseInt(countEl.textContent) + 1;
            countEl.textContent          = optimisticLikes;
            if (cntEl) cntEl.textContent = optimisticLikes;

            fetch(`/community/like/${id}`, { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    if (!data.liked) {
                        // Already liked this session — revert the optimistic update
                        btn.disabled = true;
                        btn.textContent = 'Already liked';
                    }
                    // Always confirm with server values
                    countEl.textContent          = data.likes;
                    if (cntEl) cntEl.textContent = data.likes;
                    scoreEl.textContent          = data.totalScore;
                })
                .catch(() => {
                    // Re-enable on network error so the user can retry
                    btn.disabled = false;
                    countEl.textContent          = parseInt(countEl.textContent) - 1;
                    if (cntEl) cntEl.textContent = parseInt(cntEl.textContent) - 1;
                });
        });
    });

</script>

</body>
</html>
