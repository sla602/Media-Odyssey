<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Add Media – Media Odyssey</title>
</head>
<body>

<h1>Add New Media</h1>

<form th:action="@{/community/add}" method="post">

    <label>Title</label><br/>
    <input type="text" name="title" placeholder="e.g. Interstellar" required /><br/><br/>

    <label>Category</label><br/>
    <select name="category" required>
        <option value="">Select...</option>
        <option value="Movie">Movie</option>
        <option value="Game">Game</option>
        <option value="Song">Song</option>
    </select><br/><br/>

    <!-- views, likes, and likesLastWeek all start at 0 automatically -->
    <!-- likesLastWeek is managed by TrendingScheduler every Sunday   -->

    <button type="submit">Save</button>

</form>

<br/>
<a href="/community">Back to Community</a>

</body>
</html>
